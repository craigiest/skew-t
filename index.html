<html lang="en">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;

      align-items: center;

      font-weight: 600;

      color: #e94560;

      font-size: 0.8rem;
      color: #888;
    }

    .main {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      min-width: 280px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 16px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      color: #cde;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      padding: 8px;
      border-radius: 4px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus { outline: none; border-color: #e94560; }

    .format-hint {
      font-size: 0.68rem;
      color: #666;
      line-height: 1.5;
      margin-top: 4px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.05s;
    }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #e94560;
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover { background: #c73652; }

    .btn-secondary {
      background: #0f3460;
      color: #cde;
      width: 100%;
    }
    .btn-secondary:hover { background: #1a4a80; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }

    input[type="file"] { display: none; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }

    label.checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;

    label.checkbox input[type="checkbox"] {

      width: 14px;
      height: 14px;

      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 10px;
      font-size: 0.75rem;
      line-height: 2;

      display: flex;
      justify-content: space-between;

    .idx-label { color: #888; }
    .idx-val   { color: #7ee8a2; font-weight: 600; font-family: monospace; }
    .idx-val.warn { color: #f7b731; }
    .idx-val.danger { color: #e94560; }

      color: #e94560;
      font-size: 0.75rem;
      background: #2a0d1a;
      border: 1px solid #e9456033;

      align-items: center;
      justify-content: center;
      padding: 16px;

      background: #ffffff;

      border-radius: 4px;

      position: fixed;
      background: #16213eee;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 6px 10px;

      pointer-events: none;
      display: none;
      z-index: 100;
      line-height: 1.7;

    }
  </style>

<body>

<header>
  <div>
    <h1>Skew-T Log-P Generator</h1>
    <div class="subtitle">Upper-air sounding diagram</div>
  </div>
</header>

<div class="main">
  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <div>
      <div class="section-title">Sounding Data</div>
      <textarea id="dataInput" placeholder="Paste sounding data here…

Supported formats:
• University of Wyoming (wyoming.edu)
• CSV: pressure,temp,dewpoint,windDir,windSpd
• Space/tab delimited columns

Example (CSV):
1000,28,22,180,5
925,20,15,200,10
850,13,8,220,15
700,-2,-10,240,25
500,-20,-30,250,35
300,-45,-55,260,50
200,-55,-65,270,60
100,-65,-75,280,20"></textarea>
      <div class="format-hint">
        Columns: pressure (hPa), temp (°C), dewpoint (°C),<br>
        wind direction (°), wind speed (kts) — last two optional
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="parsAndDraw()">Plot Sounding</button>
      <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Load File</button>
    </div>
    <input type="file" id="fileInput" accept=".txt,.csv" onchange="loadFile(event)" />

    <button class="btn-secondary" onclick="loadSample()">Load Sample Sounding</button>

    <div id="errorMsg" class="error-msg"></div>

    <div>
      <div class="section-title">Display Options</div>
      <div class="options-grid">
        <label class="checkbox"><input type="checkbox" id="optDryAdiabats"    checked onchange="redraw()"> Dry adiabats</label>
        <label class="checkbox"><input type="checkbox" id="optMoistAdiabats"  checked onchange="redraw()"> Moist adiabats</label>
        <label class="checkbox"><input type="checkbox" id="optMixingRatios"   checked onchange="redraw()"> Mixing ratios</label>
        <label class="checkbox"><input type="checkbox" id="optIsobars"        checked onchange="redraw()"> Isobars</label>
        <label class="checkbox"><input type="checkbox" id="optIsotherms"      checked onchange="redraw()"> Isotherms</label>
        <label class="checkbox"><input type="checkbox" id="optWindBarbs"      checked onchange="redraw()"> Wind barbs</label>
        <label class="checkbox"><input type="checkbox" id="optParcel"         checked onchange="redraw()"> Parcel path</label>
        <label class="checkbox"><input type="checkbox" id="optCAPE"           checked onchange="redraw()"> CAPE/CIN shading</label>
      </div>
    </div>

    <div>
      <div class="section-title">Sounding Indices</div>
      <div class="indices-box" id="indicesBox">
        <div style="color:#555;font-size:0.72rem">Plot a sounding to see indices.</div>
      </div>
    </div>

    <button class="btn-secondary" onclick="exportPNG()">Export PNG</button>
  </div>

  <!-- ── Canvas ── -->
  <div class="canvas-area">
    <canvas id="skewt" width="800" height="720"></canvas>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
/* ══════════════════════════════════════════════════
   CONSTANTS & HELPERS
══════════════════════════════════════════════════ */
const Rd   = 287.05;
const Rv   = 461.5;
const cp   = 1005.7;
const Lv   = 2.501e6;
const eps  = Rd / Rv;           // 0.622
const g    = 9.80665;
const T0   = 273.15;

function es(T_C) {
  // Bolton 1980 saturation vapour pressure (hPa)
  return 6.112 * Math.exp(17.67 * T_C / (T_C + 243.5));
}

function ws(p, T_C) {
  // saturation mixing ratio g/kg
  const e = es(T_C);
  return 1000 * eps * e / (p - e);
}

function Tlcl(T_C, Td_C) {
  // Temperature at LCL (Bolton 1980)
  const Tk = T_C + T0;
  const Tdk = Td_C + T0;
  const e_val = es(Td_C);
  const inv = 1 / (Tdk - 56) + Math.log(Tk / Tdk) / 800;
  return 1 / inv + 56 - T0;
}

function moist_lapse(p0, T0_C, p1) {
  // Integrate saturated adiabatic lapse rate from p0 to p1 (hPa) using RK4
  // Returns temperature (°C) at p1
  let T = T0_C;
  const steps = 20;
  const dp = (p1 - p0) / steps;
  for (let i = 0; i < steps; i++) {
    const p = p0 + i * dp;
    const k1 = gamma_s(p, T);
    const k2 = gamma_s(p + dp/2, T + k1*dp/2);
    const k3 = gamma_s(p + dp/2, T + k2*dp/2);
    const k4 = gamma_s(p + dp,   T + k3*dp);
    T += dp * (k1 + 2*k2 + 2*k3 + k4) / 6;
  }
  return T;
}

function gamma_s(p, T_C) {
  // dT/dp along moist adiabat (°C/hPa)
  const Tk = T_C + T0;
  const ws_val = ws(p, T_C) / 1000; // kg/kg
  const num = Rd*Tk + Lv*ws_val;
  const den = cp + Lv*Lv*ws_val*eps / (Rd*Tk*Tk);
  return num / (den * p);
}

function dry_adiabat_T(theta_C, p) {
  // Temperature (°C) on a dry adiabat with potential temp theta_C at 1000 hPa
  return (theta_C + T0) * Math.pow(p / 1000, Rd/cp) - T0;
}

function pot_temp(T_C, p) {
  return (T_C + T0) * Math.pow(1000 / p, Rd/cp) - T0;
}

function Td_from_w(p, w_gkg) {
  // Dewpoint (°C) from mixing ratio (g/kg) and pressure (hPa)
  const w = w_gkg / 1000;
  const e_val = w * p / (eps + w);
  return 243.5 * Math.log(e_val / 6.112) / (17.67 - Math.log(e_val / 6.112));
}

/* ══════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════ */
const canvas = document.getElementById('skewt');
const ctx    = canvas.getContext('2d');

const M = { top: 40, right: 110, bottom: 50, left: 60 };
const W  = canvas.width  - M.left - M.right;
const H  = canvas.height - M.top  - M.bottom;

// Pressure range (log scale)
const pMax = 1050;
const pMin = 100;

// Temperature range at 1000 hPa base (labels at bottom span exactly tMin→tMax)
const tMin = -40;
const tMax = 50;
// How many °C the isotherms shift from bottom (pMax) to top (pMin)
const SKEW = 65;

function logP(p) { return Math.log(p); }

function pToY(p) {
  // pMin (100 hPa) → Y=0 (top), pMax (1050 hPa) → Y=H (bottom)
  const lp = logP(p);
  const lpMin = logP(pMin);
  const lpMax = logP(pMax);
  return H * (lp - lpMin) / (lpMax - lpMin);
}

function tToX(T_C, p) {
  // Skew: isotherms shift SKEW °C to the right from pMax (bottom) to pMin (top).
  // At pMax the labels map exactly to [0, W]; beyond tMax/tMin clips off-screen.
  const tRange = tMax - tMin;
  const frac = (logP(pMax) - logP(p)) / (logP(pMax) - logP(pMin));
  return W * (T_C - tMin + frac * SKEW) / tRange;
}

function xyToTP(x, y) {
  // Inverse: canvas coords → (T, p)
  const lpMin = logP(pMin);
  const lpMax = logP(pMax);
  const lp = y / H * (lpMax - lpMin) + lpMin;
  const p  = Math.exp(lp);
  const tRange = tMax - tMin;
  const frac = (logP(pMax) - lp) / (logP(pMax) - lpMin);
  const skewShift = frac * SKEW;
  const T = x / W * tRange + tMin - skewShift;
  return { T, p };
}

/* ══════════════════════════════════════════════════
   DRAW BACKGROUND
══════════════════════════════════════════════════ */
let soundingData  = null;
let soundingTitle = null;

function drawBackground() {
  ctx.save();
  ctx.translate(M.left, M.top);

  // Clip to diagram area
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();

  const showIsobars      = document.getElementById('optIsobars').checked;
  const showIsotherms    = document.getElementById('optIsotherms').checked;
  const showDryAdiabats  = document.getElementById('optDryAdiabats').checked;
  const showMoistAdiabats= document.getElementById('optMoistAdiabats').checked;
  const showMixingRatios = document.getElementById('optMixingRatios').checked;

  // ── Isobars ──
  if (showIsobars) {
    const isobars = [1000,925,850,700,600,500,400,300,250,200,150,100];
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 0.8;
    isobars.forEach(p => {
      const y = pToY(p);
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    });
  }

  // ── Isotherms (skewed lines) ──
  if (showIsotherms) {
    for (let T = -130; T <= 60; T += 10) {
      ctx.strokeStyle = T === 0 ? '#2266bb' : '#f8a040';
      ctx.lineWidth   = 0.7;
      ctx.setLineDash([5, 3]);
      const x1 = tToX(T, pMax);
      const x2 = tToX(T, pMin);
      const y1 = pToY(pMax);
      const y2 = pToY(pMin);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Dry Adiabats ──
  if (showDryAdiabats) {
    ctx.strokeStyle = '#c06020';
    ctx.lineWidth = 0.7;
    ctx.setLineDash([5, 3]);
    for (let theta = -30; theta <= 200; theta += 10) {
      ctx.beginPath();
      let first = true;
      for (let p = pMax; p >= pMin; p -= 5) {
        const T = dry_adiabat_T(theta, p);
        const x = tToX(T, p);
        const y = pToY(p);
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // ── Moist Adiabats ──
  if (showMoistAdiabats) {
    ctx.strokeStyle = '#208050';
    ctx.lineWidth = 0.7;
    ctx.setLineDash([4, 4]);
    const maTemps = [-20,-10,0,5,10,15,20,25,30,35,40];
    maTemps.forEach(T0c => {
      ctx.beginPath();
      let T = T0c;
      let first = true;
      for (let p = 1000; p >= pMin; p -= 5) {
        const x = tToX(T, p);
        const y = pToY(p);
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
        T = moist_lapse(p, T, p - 5);
      }
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // ── Mixing Ratio Lines ──
  if (showMixingRatios) {
    ctx.strokeStyle = '#40a040';
    ctx.lineWidth = 0.6;
    ctx.setLineDash([2, 5]);
    const wLines = [0.5,1,2,3,4,6,8,10,14,18,24];
    wLines.forEach(w => {
      ctx.beginPath();
      let first = true;
      for (let p = pMax; p >= 600; p -= 5) {
        const Td = Td_from_w(p, w);
        const x  = tToX(Td, p);
        const y  = pToY(p);
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  ctx.restore();
}

/* ══════════════════════════════════════════════════
   DRAW AXES & LABELS
══════════════════════════════════════════════════ */
function drawAxes() {
  ctx.save();
  ctx.translate(M.left, M.top);

  // Border — left, top, bottom only (no right edge line)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W, 0); ctx.lineTo(0, 0);   // top
  ctx.lineTo(0, H); ctx.lineTo(W, H);   // left + bottom
  ctx.stroke();

  // Pressure labels (left axis)
  const isobars = [1000,925,850,700,600,500,400,300,250,200,150,100];
  ctx.fillStyle = '#333';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  isobars.forEach(p => {
    const y = pToY(p);
    ctx.fillText(p, -6, y + 4);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(-4, y);
    ctx.stroke();
  });

  // Temperature labels (bottom axis) at pMax where skew = 0, so labels are straight
  ctx.textAlign = 'center';
  for (let T = tMin; T <= tMax; T += 10) {
    const x = tToX(T, pMax);
    const y = H;
    ctx.fillStyle = T < 0 ? '#2266bb' : '#cc3300';
    ctx.fillText(T + '°', x, y + 16);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y + 4);
    ctx.stroke();
  }

  // Axis titles
  ctx.save();
  ctx.translate(-42, H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = '#444';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Pressure (hPa)', 0, 0);
  ctx.restore();

  ctx.fillStyle = '#444';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Temperature (°C)', W/2, H + 38);

  // Right-side height labels (km AGL/ASL from sounding)
  if (soundingData) {
    const sorted = [...soundingData].sort((a, b) => b.p - a.p);
    ctx.fillStyle = '#555';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    isobars.forEach(p => {
      const h = interpAt(sorted, p, 'h');
      if (h === null) return;
      const y = pToY(p);
      ctx.fillText((h / 1000).toFixed(1) + ' km', W + 52, y + 4);
    });
  }

  ctx.restore();
}

/* ══════════════════════════════════════════════════
   DRAW SOUNDING CURVES
══════════════════════════════════════════════════ */
function computeParcelPath(data) {
  if (!data || data.length < 3) return [];
  // Start from surface (data sorted descending pressure, so index 0 = highest p)
  const sfc = data[0];
  const T_sfc = sfc.T;
  const Td_sfc = sfc.Td;
  const p_sfc = sfc.p;

  // LCL temperature and pressure
  const T_lcl = Tlcl(T_sfc, Td_sfc);
  const theta = pot_temp(T_sfc, p_sfc);
  // Find LCL pressure: dry adiabat from surface until T == Td on that adiabat
  let p_lcl = p_sfc;
  for (let p = p_sfc; p >= pMin; p -= 1) {
    const T_da = dry_adiabat_T(theta, p);
    const Td_da = Td_from_w(p, ws(p_sfc, Td_sfc));
    if (T_da <= Td_da) { p_lcl = p; break; }
  }

  const path = [];
  // Below LCL: dry adiabat
  for (let p = p_sfc; p >= p_lcl; p -= 5) {
    path.push({ p, T: dry_adiabat_T(theta, p) });
  }
  // Above LCL: moist adiabat
  let T_ma = T_lcl;
  let prev_p = p_lcl;
  for (let p = p_lcl - 5; p >= pMin; p -= 5) {
    T_ma = moist_lapse(prev_p, T_ma, p);
    path.push({ p, T: T_ma });
    prev_p = p;
  }
  return path;
}

function computeIndices(data, parcelPath) {
  if (!data || data.length < 4) return null;
  const sfc = data[0]; // highest pressure = surface (descending sort)

  // LI: parcel T at 500 hPa minus environment T at 500 hPa
  const env500 = interp(data, 500);
  const par500 = interp(parcelPath, 500);
  const LI = env500 ? (env500.T - (par500 ? par500.T : 0)) : null;

  // CAPE / CIN
  let CAPE = 0, CIN = 0;
  if (parcelPath.length > 2) {
    let inCINzone = true;
    for (let i = 0; i < parcelPath.length - 1; i++) {
      const pP = parcelPath[i], pN = parcelPath[i+1];
      const envP = interp(data, pP.p);
      const envN = interp(data, pN.p);
      if (!envP || !envN) continue;
      const buoyP = pP.T - envP.T;
      const buoyN = pN.T - envN.T;
      // Trapezoidal integration: dCAPE = g * (buoy/Tv) * dz, simplified via hypsometric
      const Tmean = (envP.T + envN.T)/2 + T0;
      const dz = Rd * Tmean / g * Math.log(pP.p / pN.p);
      const buoyMean = (buoyP + buoyN) / 2;
      const dE = g * (buoyMean / Tmean) * dz;
      if (dE < 0 && inCINzone) CIN += dE;
      else if (dE > 0) { inCINzone = false; CAPE += dE; }
    }
  }

  // K-Index
  const e850 = interp(data, 850);
  const e700 = interp(data, 700);
  const e500_k = interp(data, 500);
  let KI = null;
  if (e850 && e700 && e500_k) {
    KI = (e850.T - e500_k.T) + e850.Td - (e700.T - e700.Td);
  }

  // Showalter Index
  let SWI = null;
  if (e850 && e500_k) {
    const parSWI = moist_lapse(850, e850.T, 500);
    SWI = e500_k.T - parSWI;
  }

  // Precipitable Water (simplified)
  let PW = 0;
  for (let i = 0; i < data.length - 1; i++) {
    const q1 = ws(data[i].p, data[i].Td) / 1000 / (1 + ws(data[i].p, data[i].Td)/1000);
    const q2 = ws(data[i+1].p, data[i+1].Td) / 1000 / (1 + ws(data[i+1].p, data[i+1].Td)/1000);
    const dp = Math.abs(data[i].p - data[i+1].p) * 100; // Pa
    PW += (q1 + q2) / 2 * dp / g; // kg/m^2 = mm
  }

  return { CAPE: Math.round(CAPE), CIN: Math.round(CIN), LI: LI ? LI.toFixed(1) : null,
           KI: KI ? KI.toFixed(1) : null, SWI: SWI ? SWI.toFixed(1) : null,
           PW: PW.toFixed(1) };
}

function interp(arr, targetP) {
  if (!arr || arr.length === 0) return null;
  for (let i = 0; i < arr.length - 1; i++) {
    const a = arr[i], b = arr[i+1];
    const pHi = Math.max(a.p, b.p), pLo = Math.min(a.p, b.p);
    if (targetP <= pHi && targetP >= pLo) {
      const f = (targetP - a.p) / (b.p - a.p);
      return {
        p: targetP,
        T: a.T + f * (b.T - a.T),
        Td: (a.Td !== undefined && b.Td !== undefined) ? a.Td + f * (b.Td - a.Td) : undefined
      };
    }
  }
  return null;
}

// Interpolate a single numeric field at a target pressure level
function interpAt(arr, targetP, field) {
  if (!arr || arr.length === 0) return null;
  for (let i = 0; i < arr.length - 1; i++) {
    const a = arr[i], b = arr[i+1];
    if (a[field] === undefined || b[field] === undefined) continue;
    const pHi = Math.max(a.p, b.p), pLo = Math.min(a.p, b.p);
    if (targetP <= pHi && targetP >= pLo) {
      const f = (targetP - a.p) / (b.p - a.p);
      return a[field] + f * (b[field] - a[field]);
    }
  }
  return null;
}

function drawSounding(data) {
  if (!data) return;
  ctx.save();
  ctx.translate(M.left, M.top);
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();

  const sorted = [...data].sort((a, b) => b.p - a.p); // surface first

  // ── CAPE/CIN Shading ──
  const parcelPath = computeParcelPath(sorted);
  if (document.getElementById('optCAPE').checked && parcelPath.length > 2) {
    // Build array of {xP, xE, y, buoy} at each parcel level
    const segs = parcelPath.map(pp => {
      const ep = interp(sorted, pp.p);
      if (!ep) return null;
      return { xP: tToX(pp.T, pp.p), xE: tToX(ep.T, pp.p), y: pToY(pp.p), buoy: pp.T - ep.T };
    }).filter(Boolean);

    // Draw a filled region between parcel and environment curves for a given buoyancy sign
    function shadeBuoyancy(sign, color) {
      let run = [];
      function flush() {
        if (run.length < 2) { run = []; return; }
        ctx.beginPath();
        run.forEach((s, i) => i === 0 ? ctx.moveTo(s.xP, s.y) : ctx.lineTo(s.xP, s.y));
        for (let i = run.length - 1; i >= 0; i--) ctx.lineTo(run[i].xE, run[i].y);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        run = [];
      }
      for (const s of segs) {
        if (sign === 1 ? s.buoy >= 0 : s.buoy <= 0) run.push(s);
        else flush();
      }
      flush();
    }

    shadeBuoyancy( 1, 'rgba(220,60,40,0.25)');  // CAPE – red
    shadeBuoyancy(-1, 'rgba(40,80,220,0.25)');  // CIN  – blue
  }

  // ── Parcel Path ──
  if (document.getElementById('optParcel').checked && parcelPath.length > 2) {
    ctx.strokeStyle = '#8800cc';
    ctx.lineWidth = 1.8;
    ctx.setLineDash([6, 3]);
    ctx.beginPath();
    parcelPath.forEach((pt, i) => {
      const x = tToX(pt.T, pt.p);
      const y = pToY(pt.p);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Temperature ──
  ctx.strokeStyle = '#cc2020';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  sorted.forEach((d, i) => {
    const x = tToX(d.T, d.p);
    const y = pToY(d.p);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // ── Dewpoint ──
  ctx.strokeStyle = '#1a7a1a';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  sorted.forEach((d, i) => {
    const x = tToX(d.Td, d.p);
    const y = pToY(d.p);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.restore();  // end clip

  // ── Wind Barbs (drawn outside the clip) ──
  if (document.getElementById('optWindBarbs').checked) {
    ctx.save();
    ctx.translate(M.left, M.top);
    sorted.forEach(d => {
      if (d.wdir === undefined || d.wspd === undefined) return;
      if (d.p < pMin) return;
      drawWindBarb(ctx, W + 20, pToY(d.p), d.wdir, d.wspd);
    });
    ctx.restore();
  }

  // ── Indices ──
  const indices = computeIndices(sorted, parcelPath);
  updateIndices(indices);
}

/* ══════════════════════════════════════════════════
   WIND BARBS
══════════════════════════════════════════════════ */
function drawWindBarb(ctx, x, y, wdir, wspd_kts) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate((wdir - 90) * Math.PI / 180);

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.2;

  const staffLen = 24;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(staffLen, 0);
  ctx.stroke();

  let spd = Math.round(wspd_kts / 5) * 5;
  let pos = staffLen;

  // Pennants (50 kts)
  while (spd >= 50) {
    ctx.beginPath();
    ctx.moveTo(pos, 0);
    ctx.lineTo(pos - 6, -8);
    ctx.lineTo(pos - 12, 0);
    ctx.closePath();
    ctx.fillStyle = '#333';
    ctx.fill();
    pos -= 12;
    spd -= 50;
  }
  // Full barbs (10 kts)
  while (spd >= 10) {
    ctx.beginPath();
    ctx.moveTo(pos, 0);
    ctx.lineTo(pos - 4, -7);
    ctx.stroke();
    pos -= 5;
    spd -= 10;
  }
  // Half barb (5 kts)
  if (spd >= 5) {
    ctx.beginPath();
    ctx.moveTo(pos, 0);
    ctx.lineTo(pos - 2, -4);
    ctx.stroke();
  }

  // Calm circle
  if (wspd_kts < 2.5) {
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, 2 * Math.PI);
    ctx.strokeStyle = '#333';
    ctx.stroke();
  }

  ctx.restore();
}

/* ══════════════════════════════════════════════════
   TITLE
══════════════════════════════════════════════════ */
function drawTitle() {
  ctx.fillStyle = '#222';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(soundingTitle || 'Skew-T Log-P Diagram', M.left + W/2, 24);
}

/* ══════════════════════════════════════════════════
   FULL REDRAW
══════════════════════════════════════════════════ */
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawBackground();
  drawAxes();
  drawTitle();  // uses soundingTitle global
  if (soundingData) drawSounding(soundingData);
}

redraw();

/* ══════════════════════════════════════════════════
   INDICES BOX
══════════════════════════════════════════════════ */
function indexClass(name, val) {
  if (val === null || val === undefined) return '';
  const v = parseFloat(val);
  if (isNaN(v)) return '';
  if (name === 'CAPE') return v > 2500 ? 'danger' : v > 1000 ? 'warn' : '';
  if (name === 'LI')   return v < -6   ? 'danger' : v < -2   ? 'warn' : '';
  if (name === 'KI')   return v > 35   ? 'danger' : v > 25   ? 'warn' : '';
  return '';
}

function updateIndices(idx) {
  const box = document.getElementById('indicesBox');
  if (!idx) { box.innerHTML = '<div style="color:#555;font-size:0.72rem">Could not compute indices.</div>'; return; }
  const rows = [
    ['CAPE', idx.CAPE + ' J/kg'],
    ['CIN',  idx.CIN  + ' J/kg'],
    ['Lifted Index', idx.LI  + ' °C'],
    ['K-Index',      idx.KI  + ' °C'],
    ['Showalter Index', idx.SWI + ' °C'],
    ['Precip. Water', idx.PW + ' mm'],
  ];
  box.innerHTML = rows.map(([label, val]) => {
    const cls = indexClass(label.split(' ')[0], val);
    return `<div class="idx-row"><span class="idx-label">${label}</span><span class="idx-val ${cls}">${val}</span></div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════
   DATA PARSING
══════════════════════════════════════════════════ */

// Parse SPC/RAP text format (%TITLE% / %RAW% / %END%)
// Columns: pressure, height, temp, dewpoint, wdir, wspd  (comma-sep, -9999=missing)
function parseSPC(lines) {
  let title = null;
  const data = [];
  let inRaw = false;
  let titleNext = false;

  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;

    if (t.startsWith('%TITLE%')) { titleNext = true; continue; }
    if (titleNext) {
      // e.g. "OUN   260514/0000" — station + YYMMDD/HHMM
      const m = t.match(/^(\S+)\s+(\d{6})\/(\d{4})/);
      if (m) {
        const [, stn, date, time] = m;
        const yy = date.slice(0,2), mo = date.slice(2,4), dd = date.slice(4,6);
        const hh = time.slice(0,2), mm = time.slice(2,4);
        title = `${stn}  20${yy}-${mo}-${dd}  ${hh}:${mm}Z`;
      } else {
        title = t;
      }
      titleNext = false;
      continue;
    }
    if (t.startsWith('%RAW%'))  { inRaw = true;  continue; }
    if (t.startsWith('%END%'))  { inRaw = false; continue; }
    if (!inRaw) continue;

    const parts = t.split(/\s*,\s*/);
    if (parts.length < 4) continue;
    const p    = parseFloat(parts[0]);
    const h    = parseFloat(parts[1]);
    const T    = parseFloat(parts[2]);
    const Td   = parseFloat(parts[3]);
    const wdir = parts.length > 4 ? parseFloat(parts[4]) : NaN;
    const wspd = parts.length > 5 ? parseFloat(parts[5]) : NaN;

    if (isNaN(p) || p < 1 || p > 1100) continue;
    if (isNaN(T) || T <= -999) continue;      // missing
    if (isNaN(Td) || Td <= -999) continue;    // missing
    if (T < -120 || T > 60) continue;

    const row = { p, T, Td };
    if (!isNaN(h) && h > -999) row.h = h;
    if (!isNaN(wdir) && wdir > -999 && !isNaN(wspd) && wspd > -999) {
      row.wdir = wdir;
      row.wspd = wspd;
    }
    data.push(row);
  }
  return { data, title };
}

function parseData(raw) {
  const lines = raw.trim().split('\n');

  // Detect SPC/RAP format
  if (lines.some(l => l.trim().startsWith('%TITLE%') || l.trim().startsWith('%RAW%'))) {
    const { data, title } = parseSPC(lines);
    return data.length >= 3 ? { data, title } : null;
  }

  // Generic: Wyoming (11 cols) or simple CSV/space-delimited (3-5 cols)
  const data = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith('//') || t.startsWith('#')) continue;
    const parts = t.split(/[\s,\t]+/);
    if (parts.length < 3) continue;
    const p = parseFloat(parts[0]);
    if (isNaN(p) || p < 1 || p > 1100) continue;

    let T, Td, h, wdir, wspd;
    if (parts.length >= 7) {
      // Wyoming: pres, hght, temp, dwpt, relh, mixr, drct, sknt, ...
      h    = parseFloat(parts[1]);
      T    = parseFloat(parts[2]);
      Td   = parseFloat(parts[3]);
      wdir = parseFloat(parts[6]);
      wspd = parseFloat(parts[7]);
    } else {
      // Simple: pressure, temp, dewpoint [, wdir, wspd]
      T    = parseFloat(parts[1]);
      Td   = parseFloat(parts[2]);
      wdir = parts.length > 3 ? parseFloat(parts[3]) : NaN;
      wspd = parts.length > 4 ? parseFloat(parts[4]) : NaN;
    }

    if (isNaN(T) || isNaN(Td)) continue;
    if (T < -120 || T > 60) continue;
    if (Td < -120 || Td > 60) continue;

    const row = { p, T, Td };
    if (!isNaN(h) && h > 0) row.h = h;
    if (!isNaN(wdir) && !isNaN(wspd)) { row.wdir = wdir; row.wspd = wspd; }
    data.push(row);
  }

  return data.length >= 3 ? { data, title: null } : null;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function parsAndDraw() {
  const raw = document.getElementById('dataInput').value;
  showError('');
  const result = parseData(raw);
  if (!result) {
    showError('Could not parse data. Supported: SPC text (%RAW%), Wyoming, or CSV (pressure, temp, dewpoint).');
    return;
  }
  soundingData  = result.data;
  soundingTitle = result.title;
  redraw();
}

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('dataInput').value = e.target.result;
    parsAndDraw();
  };
  reader.readAsText(file);
  event.target.value = '';
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX - M.left;
  const cy = (e.clientY - rect.top)  * scaleY - M.top;

  if (cx < 0 || cx > W || cy < 0 || cy > H) {
    tooltip.style.display = 'none';
    return;

  const { T, p } = xyToTP(cx, cy);
  if (p < pMin || p > pMax) { tooltip.style.display = 'none'; return; }

  let html = `P: <b>${p.toFixed(0)} hPa</b> &nbsp; T: <b>${T.toFixed(1)} °C</b>`;

  if (soundingData) {
    const ei = interp(soundingData, p);
    if (ei) {
      html += `<br>Env T: <b>${ei.T.toFixed(1)}°C</b>  Td: <b>${ei.Td !== undefined ? ei.Td.toFixed(1) : '—'}°C</b>`;
    }
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
});
